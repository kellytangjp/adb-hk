name: Sync Notion → Clinic Page

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch Notion data & build clinic page
        env:
          NOTION_TOKEN: ${{ secrets.CLINIC_NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.CLINIC_NOTION_DATABASE_ID }}
        run: node scripts/build-clinic.js

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add animal-hospital-clinic/index.html
          git diff --staged --quiet || git commit -m "chore: sync clinic from Notion [$(date '+%Y-%m-%d %H:%M')]"
          git push
